name: Build SDL2-CS

on:
    pull_request:
    workflow_call:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    compile:
        name: Compile SDL2-CS
        runs-on: ubuntu-22.04
        steps:
            - name: Clone Repository
              uses: actions/checkout@v6

            # Since SDL2-CS.csproj targets netstandard2.0 we don't need .NET 8, but let's not risk having outdated support for older versions.
            - name: Install .NET 8
              uses: actions/setup-dotnet@v5
              with:
                dotnet-version: '8.0.x'

            - name: Compile
              run: |
                dotnet build SDL2-CS.sln

            - name: Upload Artifacts
              uses: actions/upload-artifact@v7
              with:
                name: SDL2-CS
                path: ./bin
